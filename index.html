<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <title>Открытка для мамы</title>
  <style>
    body {
      margin: 0;
      font-family: 'Arial', sans-serif;
      background: linear-gradient(to right, #ffe0f0, #fff5fa);
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
    }
    .envelope {
      width: 75vw;
      height: 45vh;
      background: #d6336c;
      position: relative;
      border-radius: 12px;
      overflow: hidden;
    }
    .flap {
      position: absolute;
      top: 0;
      left: 0;
      width: 0;
      height: 0;
      border-left: 37.5vw solid transparent;
      border-right: 37.5vw solid transparent;
      border-bottom: 22.5vh solid #a61e4d;
      transition: transform 1s;
      transform-origin: top;
    }
    .letter {
      position: absolute;
      top: 100%;
      left: 0;
      width: 100%;
      height: 100%;
      background: #fff;
      padding: 20px;
      box-sizing: border-box;
      transition: top 1s;
      text-align: center;
      font-size: 20px;
      line-height: 1.6;
      overflow-y: auto;
    }
    .open .flap {
      transform: rotateX(180deg);
    }
    .open .letter {
      top: 0;
    }
    button {
      position: absolute;
      bottom: 15px;
      left: 50%;
      transform: translateX(-50%);
      background: #fff;
      color: #d6336c;
      border: none;
      padding: 20px 45px;
      font-size: 24px;
      font-weight: bold;
      border-radius: 12px;
      cursor: pointer;
    }
    img {
      margin-top: 20px; /* фото ниже текста */
      max-width: 90%;
      border-radius: 10px;
      box-shadow: 0 0 10px #aaa;
    }
  </style>
</head>
<body>
  <div class="envelope" id="envelope">
    <div class="flap"></div>
    <div class="letter">
      <h2>Любимой маме 💖</h2>
      <p>
        Мама, ты — мой самый родной и любимый человек.  
        Спасибо за твою доброту, заботу и бесконечную любовь.  
        Пусть каждый день приносит тебе счастье, здоровье и улыбки.  
        Ты — моё вдохновение и моя гордость. Я люблю тебя больше всего на свете! 🌸💐
      </p>
      <!-- Фото чуть ниже текста -->
      <img src="photo_2026-07-05_00-15-19.jpg" alt="Фото для мамы">
    </div>
    <button onclick="openEnvelope()">Открыть письмо</button>
  </div>

  <script>
    function openEnvelope() {
      document.getElementById("envelope").classList.add("open");
    }
  </script>
</body>
</html>
